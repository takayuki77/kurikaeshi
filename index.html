<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>くりかえし帳</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="くりかえし帳">
<meta name="theme-color" content="#2C5FA8">
<script src="logic.js"></script>
<style>
  :root{
    --paper:#F1F2F0; --surface:#fff; --line:#DDDFDC; --ink:#181C1B; --muted:#6B7472;
    --accent:#2C5FA8; --accent-q:#DFE8F4; --signal:#B4571A; --signal-q:#F3E4D5;
    --ok:#0E7A5F;
    --safe-t:env(safe-area-inset-top); --safe-b:env(safe-area-inset-bottom);
  }
  @media (prefers-color-scheme:dark){
    :root{ --paper:#101312; --surface:#1A1F1E; --line:#2E3533; --ink:#E4E8E6; --muted:#939C99;
      --accent:#82AADF; --accent-q:#1E2A3B; --signal:#D98B4E; --signal-q:#33261B;
      --ok:#57B7A8; }
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:var(--paper); color:var(--ink);
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic",system-ui,sans-serif;
    font-size:15px; line-height:1.6; -webkit-font-smoothing:antialiased;
    overscroll-behavior-y:none;
  }
  button,input,textarea,select{font:inherit;color:inherit}
  button{background:none;border:0;cursor:pointer}
  :focus-visible{outline:2px solid var(--accent);outline-offset:2px}

  .view{display:none;flex-direction:column;height:100dvh}
  .view.on{display:flex}

  .bar{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:calc(var(--safe-t) + 10px) 14px 10px; flex:none;
    background:var(--paper); border-bottom:1px solid var(--line);
  }
  .bar h1{font-size:19px;font-weight:700;letter-spacing:.02em}
  .bar .link{color:var(--accent);font-weight:700;font-size:14px;padding:6px 2px}
  .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px 14px calc(var(--safe-b) + 90px)}

  .rowlabel{font-size:11px;color:var(--muted);letter-spacing:.08em;font-weight:700;margin:14px 0 6px;display:flex;justify-content:space-between}

  /* グループの絞り込み */
  .chiprow{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
  .chiprow::-webkit-scrollbar{display:none}
  .chip{
    flex:none;display:flex;align-items:center;gap:6px;
    font-size:12.5px;padding:5px 12px;border-radius:999px;white-space:nowrap;
    border:1px solid var(--line);color:var(--muted);background:var(--surface);
  }
  .chip[aria-pressed="true"]{color:#fff;font-weight:700;border-color:transparent}
  .dot{width:8px;height:8px;border-radius:50%;flex:none;background:var(--muted)}
  .chip[aria-pressed="true"] .dot{background:rgba(255,255,255,.85)}

  /* タスク一覧の行。行ごとタップして詳細を開く（誤タップで完了しないよう✓ボタンは置かない） */
  .trow{
    display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:var(--surface);
    border:1px solid var(--line);border-left-width:4px;
    border-radius:11px;padding:12px;margin-bottom:8px;
  }
  .trow.overdue{border-color:var(--signal)}
  .tmain{flex:1;min-width:0}
  .tname{font-size:15px;font-weight:700;line-height:1.4;word-break:break-word}
  .tsub{font-size:11.5px;color:var(--muted);margin-top:1px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
  .tgrp{font-weight:700}
  .tstat{flex:none;font-size:13px;font-weight:700;text-align:right;white-space:nowrap}
  .tstat.over{color:var(--signal)}
  .tstat.due{color:var(--accent)}
  .tstat.ok,.tstat.free{color:var(--muted);font-weight:400;font-size:12px}

  .empty{text-align:center;color:var(--muted);padding:60px 20px;font-size:14px;line-height:1.9}

  .fab{
    position:fixed;right:18px;bottom:calc(var(--safe-b) + 18px);
    width:60px;height:60px;border-radius:50%;background:var(--accent);color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:300;
    box-shadow:0 6px 20px -4px rgba(44,95,168,.55);z-index:5;
  }

  /* フォーム（設定アプリ風のまとまり） */
  .sec{font-size:11.5px;letter-spacing:.06em;color:var(--muted);font-weight:700;margin:18px 0 7px}
  .sec:first-child{margin-top:2px}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:11px;overflow:hidden}
  .frow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 13px;border-top:1px solid var(--line);min-height:48px}
  .frow:first-child{border-top:0}
  .frow .fk{flex:none}
  .frow .fv{color:var(--muted);text-align:right}
  .frow .fv.strong{color:var(--ink);font-weight:700}
  .card input[type=text],.card textarea{
    width:100%;background:none;border:0;outline:none;padding:12px 13px;font-size:15px;
  }
  .card textarea{min-height:76px;resize:vertical;line-height:1.7;display:block}
  .card input::placeholder,.card textarea::placeholder{color:var(--muted);opacity:.75}
  .card select{
    background:none;border:0;outline:none;color:var(--ink);font-weight:700;
    text-align:right;text-align-last:right;-webkit-appearance:none;appearance:none;
    padding-right:14px;max-width:62%;
    background-image:linear-gradient(45deg,transparent 50%,var(--muted) 50%),linear-gradient(135deg,var(--muted) 50%,transparent 50%);
    background-position:calc(100% - 5px) calc(50% - 2px),calc(100% - 1px) calc(50% - 2px);
    background-size:5px 5px;background-repeat:no-repeat;
  }
  .card input[type=date]{
    background:var(--paper);border:0;border-radius:8px;padding:5px 9px;outline:none;
    font-size:14px;font-weight:700;-webkit-appearance:none;appearance:none;
  }
  /* 間隔の − ＋ */
  .step{display:flex;align-items:center;gap:2px}
  .step .num{
    width:56px;text-align:right;background:none;border:0;outline:none;
    font-size:15px;font-weight:700;padding-right:8px;-moz-appearance:textfield;
  }
  .step .num::-webkit-outer-spin-button,.step .num::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .step .sb{
    width:36px;height:32px;background:var(--paper);color:var(--accent);
    font-size:17px;font-weight:700;display:flex;align-items:center;justify-content:center;
  }
  .step .sb:first-of-type{border-radius:8px 0 0 8px}
  .step .sb:last-of-type{border-radius:0 8px 8px 0;border-left:1px solid var(--line)}
  .step .sb:disabled{color:var(--muted);opacity:.45}
  .hint{font-size:11.5px;color:var(--muted);margin:5px 2px 0;line-height:1.6}

  .btn{display:block;width:100%;text-align:center;font-weight:700;font-size:15px;padding:13px;border-radius:10px;background:var(--accent);color:#fff;margin-top:16px}
  .btn.ghost{background:transparent;color:var(--accent);border:1px solid var(--accent)}
  .btn.danger{background:transparent;color:var(--signal);border:1px solid var(--signal)}

  /* 詳細 */
  .title{font-size:20px;font-weight:700;margin:4px 0 2px;word-break:break-word}
  .subline{font-size:12.5px;color:var(--muted);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .notebox{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-top:10px;white-space:pre-wrap;font-size:13.5px;line-height:1.8;color:var(--muted)}

  /* 進み具合のバー */
  .duecard{background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:13px;margin-top:12px}
  .dstate{font-size:17px;font-weight:700;display:flex;align-items:center;gap:6px}
  .dstate.over{color:var(--signal)}
  .dstate.due{color:var(--accent)}
  .dstate.done{color:var(--ok)}
  .pbar{height:6px;border-radius:3px;background:var(--line);overflow:hidden;margin:9px 0 6px}
  .pbar i{display:block;height:100%;border-radius:3px;background:var(--accent);width:0}
  .pbar.over i{background:var(--signal)}
  .pbar.done i{background:var(--ok)}
  .pends{display:flex;justify-content:space-between;gap:10px;font-size:11.5px;color:var(--muted)}
  .pends b{color:var(--ink);font-weight:700}
  .pprow{display:flex;gap:6px;margin-top:12px;padding-top:11px;border-top:1px solid var(--line);flex-wrap:wrap;align-items:center}
  .pp{font-size:12.5px;padding:5px 12px;border-radius:999px;border:1px solid var(--line);color:var(--muted);background:var(--paper)}

  .statrow{display:flex;gap:8px;margin-top:12px}
  .stat{flex:1;background:var(--surface);border:1px solid var(--line);border-radius:11px;padding:9px 6px;text-align:center}
  .stat .sv{font-size:17px;font-weight:700}
  .stat .sv small{font-size:11px;font-weight:400;color:var(--muted)}
  .stat .sk{font-size:10.5px;color:var(--muted);margin-top:1px}

  /* 記録タイムライン */
  .dots{display:flex;gap:5px;align-items:center;flex-wrap:wrap;margin:10px 0 2px}
  .dots i{width:9px;height:9px;border-radius:50%;background:var(--ok);flex:none}
  .dots i.late{background:var(--signal)}
  .dots span{font-size:11px;color:var(--muted);margin-left:4px}
  .recfilter{font-size:12px;padding:0;color:var(--muted);font-weight:700}
  .recfilter[aria-pressed="true"]{color:var(--accent)}

  .rec{
    display:flex;gap:11px;background:var(--surface);border:1px solid var(--line);
    border-radius:11px;padding:10px 12px;margin-bottom:8px;width:100%;text-align:left;align-items:flex-start;
  }
  .rec.pp{background:none;border-style:dashed}
  .rdate{flex:none;width:64px;text-align:center;color:var(--muted)}
  .rdate .rm{font-size:10.5px}
  .rdate .rd{font-size:17px;font-weight:700;color:var(--ink);line-height:1.2}
  .rbody{flex:1;min-width:0}
  .rtop{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
  .rkind{font-size:12px;font-weight:700;color:var(--ok)}
  .rkind.pp{color:var(--muted)}
  .rgap{display:inline-block;font-size:10.5px;font-weight:700;padding:1px 8px;border-radius:5px;background:var(--accent-q);color:var(--accent)}
  .rgap.late{background:var(--signal-q);color:var(--signal)}
  .rmemo{font-size:13.5px;margin-top:3px;word-break:break-word;white-space:pre-wrap}
  .rmemo.none{color:var(--muted);font-size:12px}
  .rmove{font-size:11.5px;color:var(--muted);margin-top:2px}
  .rphotos{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap}
  .rphotos img{width:56px;height:56px;object-fit:cover;border-radius:8px;background:var(--line)}

  /* 記録の編集：写真 */
  .field{margin-top:12px}
  .field label{display:block;font-size:11.5px;letter-spacing:.05em;color:var(--muted);font-weight:700;margin-bottom:4px}
  .field input,.field textarea{
    width:100%;background:var(--surface);border:1px solid var(--line);border-radius:9px;
    padding:10px 11px;font-size:15px;outline:none;-webkit-appearance:none;appearance:none;
  }
  .field textarea{min-height:72px;resize:vertical;line-height:1.7}
  .pgrid{display:flex;gap:9px;flex-wrap:wrap;margin-top:6px}
  .pcell{position:relative;width:84px}
  .pcell img{width:84px;height:84px;object-fit:cover;border-radius:10px;background:var(--line);display:block}
  .pdel{
    position:absolute;top:-7px;right:-7px;width:24px;height:24px;border-radius:50%;
    background:var(--ink);color:var(--paper);font-size:12px;font-weight:700;
    display:flex;align-items:center;justify-content:center;
  }
  .paddbtn{
    width:84px;height:84px;border-radius:10px;border:1.5px dashed var(--line);
    color:var(--muted);font-size:24px;display:flex;align-items:center;justify-content:center;
  }

  /* 設定 */
  .lrow{display:flex;justify-content:space-between;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:12px 13px;margin-bottom:8px;width:100%;text-align:left}
  .lrow .sub{font-size:11.5px;color:var(--muted);margin-top:2px}
  .lrow .arrow{color:var(--muted)}
  .memo{background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:12px;white-space:pre-wrap;line-height:1.8;font-size:13px}

  /* 拡大 */
  #lightbox{position:fixed;inset:0;background:#000;z-index:20;display:none;flex-direction:column}
  #lightbox.on{display:flex}
  #lightbox .lbtop{display:flex;justify-content:flex-end;padding:calc(var(--safe-t) + 12px) 16px 6px}
  #lightbox img{flex:1;width:100%;object-fit:contain;min-height:0;margin-bottom:calc(var(--safe-b) + 16px)}
  .icobtn{color:#fff;font-size:15px;font-weight:700;padding:6px 8px}

  .toast{
    position:fixed;left:50%;bottom:calc(var(--safe-b) + 92px);transform:translateX(-50%);
    background:var(--ink);color:var(--paper);padding:10px 16px;border-radius:999px;
    font-size:13px;font-weight:700;z-index:30;opacity:0;pointer-events:none;transition:opacity .2s;
    max-width:86vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .toast.on{opacity:1}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  .hidden{display:none!important}
</style>
</head>
<body>

<!-- ============ ホーム ============ -->
<section id="view-home" class="view on">
  <div class="bar">
    <h1>くりかえし帳</h1>
    <button class="link" id="toSettings">設定</button>
  </div>
  <div class="scroll">
    <div class="chiprow hidden" id="groupChips"></div>
    <div id="homeSections"></div>
    <div class="empty hidden" id="homeEmpty">
      まだタスクがありません。<br>
      右下の ＋ から「換気扇フィルター掃除」<br>「コンタクトレンズ交換」などを登録してください。
    </div>
  </div>
  <button class="fab" id="fab" aria-label="タスクを追加">＋</button>
</section>

<!-- ============ タスクの追加・編集 ============ -->
<section id="view-form" class="view">
  <div class="bar">
    <button class="link" id="formCancel">キャンセル</button>
    <h1 id="formTitle" style="font-size:16px">新規タスク</h1>
    <button class="link" id="formSave">保存</button>
  </div>
  <div class="scroll">
    <div class="sec">名前</div>
    <div class="card">
      <input id="f_name" type="text" placeholder="例：エアコンフィルターの掃除">
    </div>

    <div class="sec">グループ</div>
    <div class="card">
      <div class="frow">
        <span class="fk">グループ</span>
        <select id="f_group"></select>
      </div>
    </div>

    <div class="sec">頻度</div>
    <div class="card">
      <div class="frow">
        <span class="fk">繰り返しの単位</span>
        <select id="f_unit">
          <option value="day">日</option>
          <option value="week" selected>週</option>
          <option value="month">月</option>
          <option value="none">決めない（随時）</option>
        </select>
      </div>
      <div class="frow" id="everyRow">
        <span class="fk">繰り返しの間隔</span>
        <span class="step">
          <input class="num" id="f_every" type="number" inputmode="numeric" min="1" max="365" value="1">
          <button class="sb" id="everyMinus" aria-label="間隔を減らす">−</button>
          <button class="sb" id="everyPlus" aria-label="間隔を増やす">＋</button>
        </span>
      </div>
    </div>

    <div id="schedSection">
      <div class="sec">スケジュール</div>
      <div class="card">
        <div class="frow">
          <span class="fk">次の実施予定日</span>
          <input id="f_next" type="date">
        </div>
      </div>
      <div class="hint" id="schedHint"></div>
    </div>

    <div class="sec">メモ</div>
    <div class="card">
      <textarea id="f_note" placeholder="やり方・品番など（例：フィルターの品番 ABC-123）"></textarea>
    </div>

    <button class="btn" id="formSave2">保存</button>
    <button class="btn danger hidden" id="formDel">このタスクを削除</button>
  </div>
</section>

<!-- ============ タスク詳細 ============ -->
<section id="view-detail" class="view">
  <div class="bar">
    <button class="link" id="dBack">‹ 一覧</button>
    <button class="link" id="dEdit">編集</button>
  </div>
  <div class="scroll">
    <div class="title" id="dName"></div>
    <div class="subline" id="dSub"></div>
    <div class="notebox hidden" id="dNote"></div>

    <div class="duecard" id="dDueCard">
      <div class="dstate" id="dState"></div>
      <div class="pbar" id="dBar"><i id="dBarFill"></i></div>
      <div class="pends">
        <span id="dPrev"></span>
        <span id="dNext"></span>
      </div>
      <div class="pprow">
        <span class="hint" style="margin:2px 6px 0 0">延期：</span>
        <button class="pp" data-pp="1">＋1日</button>
        <button class="pp" data-pp="3">＋3日</button>
        <button class="pp" data-pp="7">＋1週間</button>
        <button class="pp" id="ppCycle">次の周期へ</button>
        <button class="pp" id="ppDate">日付を選ぶ</button>
      </div>
    </div>

    <div class="statrow">
      <div class="stat"><div class="sv" id="stCount"></div><div class="sk">完了回数</div></div>
      <div class="stat"><div class="sv" id="stLast"></div><div class="sk">前回</div></div>
      <div class="stat"><div class="sv" id="stAvg"></div><div class="sk">平均間隔</div></div>
    </div>
    <div class="dots" id="dDots"></div>

    <button class="btn" id="dDone">✓ 完了する</button>

    <div class="rowlabel" style="margin-top:20px">
      <span>記録</span>
      <span style="display:flex;gap:12px">
        <button class="recfilter" id="recFilter" aria-pressed="false">✓ 完了のみ</button>
        <button class="link" id="dAddRec" style="font-size:12px;padding:0">＋過去の記録</button>
      </span>
    </div>
    <div id="dRecs"></div>
  </div>
</section>

<!-- ============ 記録の編集 ============ -->
<section id="view-rec" class="view">
  <div class="bar">
    <button class="link" id="recCancel">もどる</button>
    <h1 id="recTitle" style="font-size:16px">記録</h1>
    <button class="link" id="recSave">保存</button>
  </div>
  <div class="scroll">
    <div class="notebox hidden" id="recMove"></div>
    <div class="field" id="recDateField">
      <label for="r_date">日付</label>
      <input id="r_date" type="date">
    </div>
    <div class="field">
      <label for="r_memo" id="recMemoLabel">メモ（気づいたこと）</label>
      <textarea id="r_memo" placeholder="ちょっと汚れ気味だった。次は早めに"></textarea>
    </div>
    <div class="field" id="recPhotoField">
      <label>写真</label>
      <div class="pgrid" id="recPhotos"></div>
    </div>
    <button class="btn" id="recSave2">保存</button>
    <button class="btn danger" id="recDel">この記録を削除</button>
  </div>
</section>

<!-- ============ 設定 ============ -->
<section id="view-settings" class="view">
  <div class="bar">
    <button class="link" id="setBack">‹ 一覧</button>
    <h1 style="font-size:16px">設定</h1>
    <span style="width:52px"></span>
  </div>
  <div class="scroll">
    <div class="sec">グループ</div>
    <button class="lrow" id="groupEdit"><span><span>グループを編集</span><div class="sub" id="groupSub"></div></span><span class="arrow">›</span></button>

    <div class="sec">通知</div>
    <button class="lrow" id="notifRow">
      <span><span id="notifTitle">プッシュ通知</span><div class="sub" id="notifSub">確認中…</div></span>
      <span class="arrow" id="notifArrow">›</span>
    </button>
    <button class="lrow hidden" id="notifTest">
      <span><span>テスト通知を送る</span><div class="sub">いますぐ1通届くか確かめます</div></span>
      <span class="arrow">›</span>
    </button>

    <div class="sec">バックアップ</div>
    <button class="lrow" id="expBtn"><span><span>すべて書き出す</span><div class="sub">タスク・記録・写真を1ファイルに</div></span><span class="arrow">›</span></button>
    <button class="lrow" id="impBtn"><span><span>ファイルから読み込む</span><div class="sub">機種変更・別端末へ移すとき</div></span><span class="arrow">›</span></button>

    <div class="sec">保存状況</div>
    <div class="memo" id="storage"></div>

    <div class="sec">注意</div>
    <div class="memo" style="font-size:13px;color:var(--muted)">
      データはこのiPhoneの中だけに保存され、どこにも送信されません。
      iOSの「Safariの履歴とデータを消去」を実行すると中身も消えます。
      ときどき「すべて書き出す」でバックアップしてください。
    </div>
  </div>
</section>

<!-- ============ 拡大 ============ -->
<div id="lightbox">
  <div class="lbtop"><button class="icobtn" id="lbClose">✕ 閉じる</button></div>
  <img id="lbImg" alt="拡大表示">
</div>

<div class="toast" id="toast"></div>
<input type="file" id="photoPick" accept="image/*" multiple class="hidden">
<input type="file" id="fileImport" accept="application/json,.json" class="hidden">

<script>
/* ================= 保存領域 ================= */
const DB = 'kurikaeshi', VER = 1;
let _db = null;
function openDB(){
  return new Promise((res, rej)=>{
    const r = indexedDB.open(DB, VER);
    r.onupgradeneeded = ()=>{
      const d = r.result;
      if(!d.objectStoreNames.contains('tasks'))   d.createObjectStore('tasks',   {keyPath:'id'});
      if(!d.objectStoreNames.contains('records')) d.createObjectStore('records', {keyPath:'id'});
    };
    r.onsuccess = ()=>res(r.result);
    r.onerror   = ()=>rej(r.error);
  });
}
async function conn(){ if(!_db) _db = await openDB(); return _db; }
function req(r){ return new Promise((res, rej)=>{ r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
async function dbAll(store){ const d = await conn(); return req(d.transaction(store).objectStore(store).getAll()); }
async function dbPut(store, val){
  const d = await conn();
  const r = await req(d.transaction(store,'readwrite').objectStore(store).put(val));
  if(store === 'tasks') queuePushSync();   // 予定が変わったら通知係にも伝える
  return r;
}
async function dbDel(store, key){
  const d = await conn();
  const r = await req(d.transaction(store,'readwrite').objectStore(store).delete(key));
  if(store === 'tasks') queuePushSync();
  return r;
}

let tasks = [], records = [];
async function loadAll(){
  tasks   = await dbAll('tasks');
  records = await dbAll('records');
}
/* 記録は「完了」と「延期」の2種類。type がないものは旧データの完了記録 */
const recsOf = id => records.filter(r=>r.taskId === id);
const doneOf  = id => recsOf(id).filter(r=>r.type !== 'postpone');
const doneDatesOf = id => doneOf(id).map(r=>r.dateStr).sort();
const lastDateOf = id => {
  const ds = doneDatesOf(id);
  return ds.length ? ds[ds.length - 1] : null;
};

/* ================= グループ ================= */
const DEF_GROUPS = ['掃除','家事','健康','仕事'];
const PALETTE = ['#2C5FA8','#0E8A6B','#B4571A','#7A4FBF','#C13E6A','#3E8FC1','#8A7A22'];
const ls = {
  get(k, d){ try{ const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; }catch(e){ return d; } },
  set(k, v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
};
const groups = ()=> ls.get('kk.groups', DEF_GROUPS);
/* グループ名から色を決める。並び順が変わっても色が飛ばないよう名前から引く */
function colorOf(name){
  const i = groups().indexOf(name);
  return i < 0 ? 'var(--muted)' : PALETTE[i % PALETTE.length];
}

/* ================= 画面遷移・通知 ================= */
const views = ['home','form','detail','rec','settings'];
let current = 'home';
function show(name){
  views.forEach(v => document.getElementById('view-'+v).classList.toggle('on', v === name));
  current = name;
  document.querySelectorAll('.scroll').forEach(s => { if(s.closest('.view').classList.contains('on')) s.scrollTop = 0; });
}
let toastTimer;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('on'), 1900);
}
function updateBadge(n){
  try{
    if(!('setAppBadge' in navigator)) return;
    if(n > 0) navigator.setAppBadge(n); else navigator.clearAppBadge();
  }catch(e){}
}
function fmtDate(s){
  const d = parseDate(s);
  const w = ['日','月','火','水','木','金','土'][d.getDay()];
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日(${w})`;
}
function fmtShort(s){
  const d = parseDate(s);
  return `${d.getMonth()+1}月${d.getDate()}日`;
}

/* ================= 写真の縮小（保存用） ================= */
const MAX_FULL = 1400, MAX_THUMB = 360;
function fit(w, h, max){ const r = Math.min(1, max / Math.max(w, h)); return [Math.round(w*r), Math.round(h*r)]; }
function draw(src, w, h){
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const g = c.getContext('2d');
  g.imageSmoothingEnabled = true;
  g.imageSmoothingQuality = 'high';
  g.drawImage(src, 0, 0, w, h);
  return c;
}
function toBlob(canvas, q){ return new Promise(res => canvas.toBlob(res, 'image/jpeg', q)); }
async function bitmapOf(blob){
  try { return await createImageBitmap(blob, {imageOrientation:'from-image'}); }
  catch(e){ return await createImageBitmap(blob); }
}
async function preparePhoto(file){
  const bmp = await bitmapOf(file);
  const [fw, fh] = fit(bmp.width, bmp.height, MAX_FULL);
  const [tw, th] = fit(bmp.width, bmp.height, MAX_THUMB);
  const full  = await toBlob(draw(bmp, fw, fh), .82);
  const thumb = await toBlob(draw(bmp, tw, th), .70);
  bmp.close();
  return {id: crypto.randomUUID(), full, thumb};
}

const urls = new Map();
function urlFor(key, blob){
  if(urls.has(key)) URL.revokeObjectURL(urls.get(key));
  const u = URL.createObjectURL(blob);
  urls.set(key, u);
  return u;
}

/* ================= ホーム ================= */
let fGroup = '';   // 絞り込み中のグループ。'' はすべて

function renderGroupChips(){
  const el = document.getElementById('groupChips');
  const used = groups().filter(g => tasks.some(t => t.group === g));
  el.classList.toggle('hidden', used.length === 0);
  el.innerHTML = '';
  if(!used.length){ fGroup = ''; return; }
  if(fGroup && !used.includes(fGroup)) fGroup = '';
  const mk = (label, val, color)=>{
    const b = document.createElement('button');
    b.className = 'chip';
    b.setAttribute('aria-pressed', fGroup === val);
    if(fGroup === val && color) b.style.background = color;
    if(color){
      const d = document.createElement('span');
      d.className = 'dot';
      if(fGroup !== val) d.style.background = color;
      b.appendChild(d);
    }
    const s = document.createElement('span');
    s.textContent = label;
    b.appendChild(s);
    b.onclick = ()=>{ fGroup = (fGroup === val ? '' : val); renderHome(); };
    return b;
  };
  const all = mk('すべて', '', null);
  if(fGroup === '') all.style.background = 'var(--accent)';
  el.appendChild(all);
  used.forEach(g => el.appendChild(mk(g, g, colorOf(g))));
}

function taskRow(task, t){
  const row = document.createElement('button');
  row.className = 'trow';
  row.onclick = ()=>openDetail(task.id);
  if(task.group) row.style.borderLeftColor = colorOf(task.group);

  const main = document.createElement('div');
  main.className = 'tmain';
  const nm = document.createElement('div');
  nm.className = 'tname'; nm.textContent = task.name;
  const sub = document.createElement('div');
  sub.className = 'tsub';
  if(task.group){
    const g = document.createElement('span');
    g.className = 'tgrp';
    g.style.color = colorOf(task.group);
    g.textContent = task.group;
    sub.append(g, document.createTextNode('·'));
  }
  const last = lastDateOf(task.id);
  const txt = document.createElement('span');
  const lastLabel = last ? agoLabel(last, t) : 'まだ記録なし';
  txt.textContent = task.type === 'interval'
    ? `前回 ${lastLabel}・${intervalLabel(task)}`
    : `前回 ${lastLabel}・記録${doneOf(task.id).length}回`;
  sub.appendChild(txt);
  main.append(nm, sub);

  const stat = document.createElement('span');
  stat.className = 'tstat';
  if(task.type === 'interval'){
    const d = dueLabel(task, t);
    stat.textContent = d.text;
    stat.classList.add(d.cls);
    if(d.cls === 'over') row.classList.add('overdue');
  }else{
    stat.classList.add('free');
    stat.textContent = last ? agoLabel(last, t) : '—';
  }
  row.append(main, stat);
  return row;
}
function renderHome(){
  const t = todayStr();
  const wrap = document.getElementById('homeSections');
  const empty = document.getElementById('homeEmpty');
  wrap.innerHTML = '';
  renderGroupChips();
  empty.classList.toggle('hidden', tasks.length > 0);
  if(!tasks.length){ updateBadge(0); return; }

  const list = fGroup ? tasks.filter(x => x.group === fGroup) : tasks;
  const due = [], later = [], anytime = [];
  list.forEach(task=>{
    if(task.type !== 'interval'){ anytime.push(task); return; }
    (diffDays(t, task.nextDue) <= 0 ? due : later).push(task);
  });
  due.sort((a,b)=> a.nextDue < b.nextDue ? -1 : 1);
  later.sort((a,b)=> a.nextDue < b.nextDue ? -1 : 1);
  anytime.sort((a,b)=> (lastDateOf(b.id)||'') < (lastDateOf(a.id)||'') ? -1 : 1);

  const section = (label, arr)=>{
    if(!arr.length) return;
    const h = document.createElement('div');
    h.className = 'rowlabel';
    h.innerHTML = `<span>${label}</span><span>${arr.length}</span>`;
    wrap.appendChild(h);
    arr.forEach(task=>wrap.appendChild(taskRow(task, t)));
  };
  section('今日やること', due);
  section('今後', later);
  section('いつでも', anytime);

  if(!due.length && !later.length && !anytime.length){
    const e = document.createElement('div');
    e.className = 'empty';
    e.textContent = `「${fGroup}」のタスクはありません。`;
    wrap.appendChild(e);
  }
  // バッジは絞り込みに関係なく、今日やること全体の件数
  updateBadge(tasks.filter(x => x.type === 'interval' && diffDays(t, x.nextDue) <= 0).length);
}

/* ================= 完了 ================= */
async function addRecord(task, dateStr){
  const rec = {id: crypto.randomUUID(), taskId: task.id, at: Date.now(), dateStr, type: 'done', memo: '', photos: []};
  await dbPut('records', rec);
  records.push(rec);
  if(task.type === 'interval'){
    // 完了した日から数え直す
    task.nextDue = nextFrom(dateStr, task);
    await dbPut('tasks', task);
  }
  return rec;
}

/* ================= タスクの追加・編集 ================= */
let editingTask = null;   // 編集中のタスクid。新規はnull
const $ = id => document.getElementById(id);

function fillGroupSelect(chosen){
  const el = $('f_group');
  el.innerHTML = '';
  const none = document.createElement('option');
  none.value = ''; none.textContent = 'なし';
  el.appendChild(none);
  groups().forEach(g=>{
    const o = document.createElement('option');
    o.value = g; o.textContent = g;
    el.appendChild(o);
  });
  el.value = groups().includes(chosen) ? chosen : '';
}
/* 次にやる日を直接入れる。完了すると、その完了日から間隔ぶん先が次になる */
function syncForm(){
  const unit = $('f_unit').value;
  const isInt = unit !== 'none';
  $('everyRow').classList.toggle('hidden', !isInt);
  $('schedSection').classList.toggle('hidden', !isInt);
  if(!isInt) return;
  const every = clampEvery($('f_every').value);
  $('everyMinus').disabled = every <= 1;
  const next = $('f_next').value || todayStr();
  const t = todayStr();
  const when = next === t ? '今日やること' : (diffDays(t, next) < 0 ? '今日やること（超過）' : '今後');
  $('schedHint').textContent =
    `${fmtShort(next)} にやる予定として一覧の「${when}」に出ます。`
    + `完了すると、その完了日から ${every}${unitLabel(unit)} 後が次の予定になります。`;
}
function clampEvery(v){ return Math.max(1, Math.min(365, Number(v) || 1)); }
$('f_unit').onchange = syncForm;
$('f_every').oninput = syncForm;
$('f_next').onchange = syncForm;
$('everyMinus').onclick = ()=>{ $('f_every').value = clampEvery(Number($('f_every').value) - 1); syncForm(); };
$('everyPlus').onclick  = ()=>{ $('f_every').value = clampEvery(Number($('f_every').value) + 1); syncForm(); };

function openForm(id){
  editingTask = id || null;
  const task = id ? tasks.find(x=>x.id===id) : null;
  $('formTitle').textContent = task ? 'タスクを編集' : '新規タスク';
  $('f_name').value  = task ? task.name : '';
  fillGroupSelect(task ? task.group : '');
  $('f_unit').value  = task ? (task.type === 'interval' ? task.unit : 'none') : 'week';
  $('f_every').value = task && task.every ? task.every : 1;
  $('f_next').value  = task && task.nextDue ? task.nextDue : todayStr();
  $('f_note').value  = task ? (task.note || '') : '';
  $('formDel').classList.toggle('hidden', !task);
  syncForm();
  show('form');
}
async function saveForm(){
  const name = $('f_name').value.trim();
  if(!name){ toast('名前を入れてください'); return; }
  const unit  = $('f_unit').value;
  const group = $('f_group').value;
  const note  = $('f_note').value.trim();

  const task = editingTask ? tasks.find(x=>x.id===editingTask) : {id: crypto.randomUUID(), createdAt: Date.now()};
  const wasDue = task.nextDue;
  Object.assign(task, {name, group, note, updatedAt: Date.now()});

  if(unit === 'none'){
    task.type = 'anytime';
    delete task.every; delete task.unit; delete task.nextDue;
  }else{
    // 入れた日がそのまま次の実施予定日。完了して初めて、そこから間隔ぶん先へ進む
    const every = clampEvery($('f_every').value);
    Object.assign(task, {type:'interval', every, unit, nextDue: $('f_next').value || todayStr()});
  }
  await dbPut('tasks', task);
  if(!editingTask) tasks.push(task);
  toast(editingTask && wasDue && task.nextDue !== wasDue
    ? `保存しました（次回 ${fmtShort(task.nextDue)}）`
    : '保存しました');
  renderHome();
  if(editingTask) openDetail(task.id); else show('home');
}
$('fab').onclick = ()=>openForm(null);
$('formSave').onclick  = saveForm;
$('formSave2').onclick = saveForm;
$('formCancel').onclick = ()=>{ if(editingTask) openDetail(editingTask); else show('home'); };
$('formDel').onclick = async ()=>{
  const task = tasks.find(x=>x.id===editingTask);
  const n = recsOf(task.id).length;
  if(!confirm(`「${task.name}」を削除します。記録${n}件も一緒に消えます。元に戻せません。`)) return;
  for(const r of recsOf(task.id)) await dbDel('records', r.id);
  await dbDel('tasks', task.id);
  tasks = tasks.filter(x=>x.id!==task.id);
  records = records.filter(r=>r.taskId!==task.id);
  toast('削除しました');
  renderHome();
  show('home');
};

/* ================= 詳細 ================= */
let detailId = null;
function openDetail(id){
  detailId = id;
  const task = tasks.find(x=>x.id===id);
  if(!task) return show('home');
  const t = todayStr();
  $('dName').textContent = task.name;

  const sub = $('dSub');
  sub.innerHTML = '';
  if(task.group){
    const d = document.createElement('span');
    d.className = 'dot'; d.style.background = colorOf(task.group);
    const g = document.createElement('span');
    g.style.color = colorOf(task.group); g.style.fontWeight = '700';
    g.textContent = task.group;
    sub.append(d, g, document.createTextNode('·'));
  }
  const s = document.createElement('span');
  s.textContent = intervalLabel(task);
  sub.appendChild(s);

  const note = $('dNote');
  note.textContent = task.note || '';
  note.classList.toggle('hidden', !task.note);

  const dates = doneDatesOf(id);
  const last = dates.length ? dates[dates.length - 1] : null;

  const card = $('dDueCard');
  if(task.type === 'interval'){
    card.classList.remove('hidden');
    renderBar(task, last, t);
    // 「次の周期へ」。＋1日/＋3日/＋1週間と同じ意味になるときは重複するので隠す
    const cyc = diffDays(task.nextDue, nextFrom(task.nextDue, task));
    $('ppCycle').textContent = `＋${task.every}${unitLabel(task.unit)}`;
    $('ppCycle').classList.toggle('hidden', [1, 3, 7].includes(cyc));
  }else{
    card.classList.add('hidden');
  }

  $('stCount').innerHTML = `${dates.length}<small> 回</small>`;
  $('stLast').textContent = last ? agoLabel(last, t) : '—';
  const avg = avgInterval(dates);
  $('stAvg').innerHTML = avg === null ? '—' : `${avg}<small> 日</small>`;

  renderDots(task, dates);
  renderRecs(task);
  show('detail');
}

/* 前回から次回までの、どのあたりにいるかを棒で見せる */
function renderBar(task, last, t){
  const state = $('dState'), bar = $('dBar'), fill = $('dBarFill');
  const d = dueLabel(task, t);
  const doneToday = last === t;
  const cls = doneToday ? 'done' : d.cls;
  state.className = 'dstate ' + cls;
  state.textContent = doneToday ? '✓ 今日 完了' : d.text;
  bar.className = 'pbar ' + cls;

  // 起点は前回やった日。まだ記録がなければ、予定日から1周期ぶん戻した日
  const base = last || prevFrom(task.nextDue, task);
  const total = Math.max(1, diffDays(base, task.nextDue));
  const frac = doneToday || d.cls === 'over' ? 1 : Math.min(1, Math.max(0.02, diffDays(base, t) / total));
  fill.style.width = (frac * 100).toFixed(1) + '%';

  $('dPrev').innerHTML = last ? `前回 <b>${agoLabel(last, t)}</b>` : '前回 まだ記録なし';
  $('dNext').innerHTML = `次回 <b>${fmtShort(task.nextDue)}</b>`;
}
/* 完了の履歴を点で並べる（緑＝周期内、赤＝遅れ）。右が最新 */
function renderDots(task, dates){
  const el = $('dDots');
  el.innerHTML = '';
  if(dates.length < 2){ el.classList.add('hidden'); return; }
  el.classList.remove('hidden');
  const show = dates.slice(-14);
  show.forEach((ds, i)=>{
    const dot = document.createElement('i');
    const prev = dates[dates.length - show.length + i - 1];
    if(prev && isLate(prev, ds, task)) dot.className = 'late';
    dot.title = fmtShort(ds);
    el.appendChild(dot);
  });
  const lbl = document.createElement('span');
  lbl.textContent = `直近${show.length}回（右が最新・赤は遅れ）`;
  el.appendChild(lbl);
}
let doneOnly = false;   // 記録の「完了のみ」表示
$('recFilter').onclick = ()=>{
  doneOnly = !doneOnly;
  $('recFilter').setAttribute('aria-pressed', doneOnly);
  renderRecs(tasks.find(x=>x.id===detailId));
};
function renderRecs(task){
  const wrap = $('dRecs');
  wrap.innerHTML = '';
  const all = recsOf(task.id).sort((a,b)=> a.dateStr === b.dateStr ? b.at - a.at : (a.dateStr < b.dateStr ? 1 : -1));
  const rs = doneOnly ? all.filter(r=>r.type !== 'postpone') : all;
  if(!rs.length){
    const e = document.createElement('div');
    e.className = 'empty';
    e.style.padding = '30px 20px';
    e.textContent = doneOnly
      ? 'まだ完了の記録がありません。'
      : 'まだ記録がありません。「✓ 完了する」を押すと1件目が記録されます。';
    wrap.appendChild(e);
    return;
  }
  // 完了どうしの間隔を出す（延期の記録はまたぐ）
  const doneAsc = all.filter(r=>r.type !== 'postpone').slice().reverse();
  const gap = new Map(), late = new Set();
  for(let i = 1; i < doneAsc.length; i++){
    const prev = doneAsc[i-1].dateStr, cur = doneAsc[i].dateStr;
    const d = diffDays(prev, cur);
    if(d <= 0) continue;
    gap.set(doneAsc[i].id, d);
    if(isLate(prev, cur, task)) late.add(doneAsc[i].id);
  }
  rs.forEach(r=>{
    const pp = r.type === 'postpone';
    const b = document.createElement('button');
    b.className = 'rec' + (pp ? ' pp' : '');
    const dt = parseDate(r.dateStr);
    const date = document.createElement('div');
    date.className = 'rdate';
    date.innerHTML = `<div class="rm">${dt.getFullYear()}年${dt.getMonth()+1}月</div><div class="rd">${dt.getDate()}</div>`;

    const body = document.createElement('div');
    body.className = 'rbody';
    const top = document.createElement('div');
    top.className = 'rtop';
    const kind = document.createElement('span');
    kind.className = 'rkind' + (pp ? ' pp' : '');
    kind.textContent = pp ? '🗓 延期' : '✓ 完了';
    top.appendChild(kind);
    if(gap.has(r.id)){
      const g = document.createElement('span');
      g.className = 'rgap' + (late.has(r.id) ? ' late' : '');
      g.textContent = '＋' + gap.get(r.id) + '日';
      top.appendChild(g);
    }
    body.appendChild(top);

    const memo = document.createElement('div');
    if(r.memo){ memo.className = 'rmemo'; memo.textContent = r.memo; }
    else{
      memo.className = 'rmemo none';
      memo.textContent = pp ? '理由なし（タップして追記）' : 'メモなし（タップして追記）';
    }
    body.appendChild(memo);

    if(pp && r.from && r.to){
      const mv = document.createElement('div');
      mv.className = 'rmove';
      mv.textContent = `${fmtShort(r.from)} から ${fmtShort(r.to)} に延期`;
      body.appendChild(mv);
    }
    if(r.photos && r.photos.length){
      const ph = document.createElement('div');
      ph.className = 'rphotos';
      r.photos.forEach(p=>{
        const img = document.createElement('img');
        img.src = urlFor('rt' + p.id, p.thumb);
        img.alt = '';
        ph.appendChild(img);
      });
      body.appendChild(ph);
    }
    b.append(date, body);
    b.onclick = ()=>openRec(r.id);
    wrap.appendChild(b);
  });
}
$('dBack').onclick = ()=>{ renderHome(); show('home'); };
$('dEdit').onclick = ()=>openForm(detailId);
$('dDone').onclick = async ()=>{
  const task = tasks.find(x=>x.id===detailId);
  const rec = await addRecord(task, todayStr());
  toast('完了を記録しました。メモや写真も残せます');
  openRec(rec.id);
};
$('dAddRec').onclick = ()=>{
  const task = tasks.find(x=>x.id===detailId);
  openRec(null, {id: crypto.randomUUID(), taskId: task.id, at: Date.now(), dateStr: todayStr(), type:'done', memo:'', photos:[], _new:true});
};

/* 延期。日付を動かすだけでなく、理由を書ける記録として履歴に残す */
async function postponeTo(task, dateStr){
  const from = task.nextDue;
  if(from === dateStr){ toast('同じ日付です'); return; }
  task.nextDue = dateStr;
  await dbPut('tasks', task);
  const rec = {
    id: crypto.randomUUID(), taskId: task.id, at: Date.now(), dateStr: todayStr(),
    type: 'postpone', from, to: dateStr, memo: '', photos: [],
  };
  await dbPut('records', rec);
  records.push(rec);
  toast(`${fmtShort(from)} から ${fmtShort(dateStr)} に延期しました`);
  openRec(rec.id);   // 理由をその場で残せる
}
document.querySelectorAll('.pp[data-pp]').forEach(b=>{
  b.onclick = ()=>{
    const task = tasks.find(x=>x.id===detailId);
    const t = todayStr();
    const base = diffDays(t, task.nextDue) < 0 ? t : task.nextDue;  // 超過中は今日から数える
    postponeTo(task, addDays(base, Number(b.dataset.pp)));
  };
});
$('ppCycle').onclick = ()=>{
  const task = tasks.find(x=>x.id===detailId);
  const t = todayStr();
  const base = diffDays(t, task.nextDue) < 0 ? t : task.nextDue;
  postponeTo(task, nextFrom(base, task));
};
$('ppDate').onclick = ()=>{
  const task = tasks.find(x=>x.id===detailId);
  const v = prompt('次の実施予定日（例 2026-08-01）', task.nextDue);
  if(!v) return;
  if(!/^\d{4}-\d{2}-\d{2}$/.test(v.trim())){ toast('2026-08-01 の形式で入れてください'); return; }
  postponeTo(task, v.trim());
};

/* ================= 記録の編集 ================= */
let recDraft = null;   // 編集中の記録の作業コピー
function openRec(id, fresh){
  const src = fresh || records.find(r=>r.id===id);
  if(!src) return;
  recDraft = {
    id:src.id, taskId:src.taskId, at:src.at, dateStr:src.dateStr,
    type: src.type || 'done', from: src.from, to: src.to,
    memo:src.memo, photos:(src.photos||[]).slice(), _new:!!src._new,
  };
  const pp = recDraft.type === 'postpone';
  $('recTitle').textContent = pp ? '延期の記録' : (fresh ? '記録を追加' : '記録');
  $('recMove').classList.toggle('hidden', !pp);
  if(pp) $('recMove').textContent = `${fmtDate(recDraft.from)} から ${fmtDate(recDraft.to)} に延期しました。`;
  $('recDateField').classList.toggle('hidden', pp);
  $('recPhotoField').classList.toggle('hidden', pp);
  $('recMemoLabel').textContent = pp ? '延期の理由（次回への申し送り）' : 'メモ（気づいたこと）';
  $('r_memo').placeholder = pp ? '雨が続いたので延期。来週やる' : 'ちょっと汚れ気味だった。次は早めに';
  $('recDel').textContent = pp ? 'この延期の記録を消す（日付は戻りません）' : 'この記録を削除';
  $('r_date').value = recDraft.dateStr;
  $('r_memo').value = recDraft.memo || '';
  $('recDel').classList.toggle('hidden', !!fresh);
  renderRecPhotos();
  show('rec');
}
function renderRecPhotos(){
  const g = $('recPhotos');
  g.innerHTML = '';
  recDraft.photos.forEach((p, i)=>{
    const cell = document.createElement('div');
    cell.className = 'pcell';
    const img = document.createElement('img');
    img.src = urlFor('pe' + p.id, p.thumb);
    img.alt = '写真';
    img.onclick = ()=>openLightbox(p.full);
    const del = document.createElement('button');
    del.className = 'pdel'; del.textContent = '✕';
    del.setAttribute('aria-label','写真を外す');
    del.onclick = ()=>{ recDraft.photos.splice(i,1); renderRecPhotos(); };
    cell.append(img, del);
    g.appendChild(cell);
  });
  const add = document.createElement('button');
  add.className = 'paddbtn'; add.textContent = '＋';
  add.setAttribute('aria-label','写真を追加');
  add.onclick = ()=>$('photoPick').click();
  g.appendChild(add);
}
$('photoPick').onchange = async e=>{
  const files = Array.from(e.target.files || []);
  e.target.value = '';
  if(!files.length) return;
  toast('写真を取り込み中…');
  for(const f of files) recDraft.photos.push(await preparePhoto(f));
  renderRecPhotos();
  toast(`写真を${files.length}枚付けました（保存を押してください）`);
};
/* 一番新しい完了日が変わったら、その日を起点に次回を計算し直す。
   （完了を押し忘れて過去の日付に直したときも、さかのぼって次回が決まる）
   日付が変わっていないときは触らない。延期で動かした予定日を巻き戻さないため。 */
async function reschedule(task, before){
  if(!task || task.type !== 'interval') return null;
  const after = lastDateOf(task.id);
  if(!after || after === before) return null;
  task.nextDue = nextFrom(after, task);
  await dbPut('tasks', task);
  return task.nextDue;
}
async function saveRec(){
  const taskId = recDraft.taskId;
  const task = tasks.find(x=>x.id===taskId);
  const before = lastDateOf(taskId);
  // 延期の記録は「延期した日」で固定。日付欄も出していない
  if(recDraft.type !== 'postpone') recDraft.dateStr = $('r_date').value || recDraft.dateStr;
  recDraft.memo = $('r_memo').value.trim();
  const isNew = recDraft._new; delete recDraft._new;
  await dbPut('records', recDraft);
  if(isNew) records.push(recDraft);
  else records[records.findIndex(r=>r.id===recDraft.id)] = recDraft;
  const moved = await reschedule(task, before);
  toast(moved ? `保存しました（次回 ${fmtShort(moved)}）` : '保存しました');
  openDetail(taskId);
}
$('recSave').onclick  = saveRec;
$('recSave2').onclick = saveRec;
$('recCancel').onclick = ()=>openDetail(recDraft.taskId);
$('recDel').onclick = async ()=>{
  if(!confirm('この記録を削除します。元に戻せません。')) return;
  const taskId = recDraft.taskId;
  const task = tasks.find(x=>x.id===taskId);
  const before = lastDateOf(taskId);
  await dbDel('records', recDraft.id);
  records = records.filter(r=>r.id!==recDraft.id);
  const moved = await reschedule(task, before);
  toast(moved ? `削除しました（次回 ${fmtShort(moved)}）` : '削除しました');
  openDetail(taskId);
};

/* ================= 拡大 ================= */
function openLightbox(blob){
  $('lbImg').src = urlFor('lb', blob);
  $('lightbox').classList.add('on');
}
$('lbClose').onclick = ()=>$('lightbox').classList.remove('on');

/* ================= 設定 ================= */
$('toSettings').onclick = ()=>{ renderSettings(); show('settings'); };
$('setBack').onclick = ()=>{ renderHome(); show('home'); };

async function renderSettings(){
  renderNotif();
  $('groupSub').textContent = groups().join(' / ');
  let size = '';
  try{
    const est = await navigator.storage.estimate();
    size = ' · 約 ' + (est.usage / 1048576).toFixed(1) + ' MB';
  }catch(e){}
  $('storage').innerHTML =
    `タスク${tasks.length}件 · 記録${records.length}件${size}<br><span style="color:var(--muted)">この端末の中にのみ保存されています</span>`;
}
$('groupEdit').onclick = ()=>{
  const cur = groups();
  const v = prompt('グループを「/」区切りで並べてください。', cur.join(' / '));
  if(v === null) return;
  const list = v.split('/').map(s=>s.trim()).filter(Boolean).slice(0, 12);
  if(!list.length){ toast('1つ以上必要です'); return; }
  const gone = cur.filter(g => !list.includes(g) && tasks.some(t => t.group === g));
  if(gone.length && !confirm(`「${gone.join('」「')}」を使っているタスクは、グループなしになります。よろしいですか？`)) return;
  ls.set('kk.groups', list);
  tasks.forEach(async t => {
    if(t.group && !list.includes(t.group)){ t.group = ''; await dbPut('tasks', t); }
  });
  renderSettings(); renderHome();
  toast('変更しました');
};

/* ================= プッシュ通知 =================
   毎朝8時に「今日やること」を知らせる。Cloudflare の通知係へ
   「購読情報」と「タスク名・予定日」だけを預ける（メモ・写真は端末から出ない）。 */
const PUSH_API = 'https://kurikaeshi-push.takayuki77.workers.dev';
const VAPID_PUBLIC = 'BLAtoF0CC4q9AgaQRyBbuDAZuGzY_qU7AiJ7t-VT66-8MZM5IaPF4OliRLuFL9v6R8yPmZnTooTj7vbfEcteLlc';

function b64ToBytes(s){
  const b64 = (s + '='.repeat((4 - s.length % 4) % 4)).replace(/-/g, '+').replace(/_/g, '/');
  const bin = atob(b64);
  const out = new Uint8Array(bin.length);
  for(let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
  return out;
}
const pushOn = ()=> !!ls.get('kk.push', null);
const standalone = ()=> window.matchMedia('(display-mode: standalone)').matches || navigator.standalone === true;
const pushable  = ()=> 'serviceWorker' in navigator && 'PushManager' in window && typeof Notification !== 'undefined';

function pushTasks(){
  return tasks.filter(t => t.type === 'interval' && t.nextDue).map(t => ({name: t.name, due: t.nextDue}));
}
async function currentSub(){
  const reg = await navigator.serviceWorker.ready;
  return reg.pushManager.getSubscription();
}
/* タスクを変えたら、預けてある予定日も更新する（まとめて1回だけ送る） */
let syncTimer = null;
function queuePushSync(){
  if(!pushOn()) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(()=>{ syncPush().catch(()=>{}); }, 1200);
}
async function syncPush(){
  const sub = await currentSub();
  if(!sub){ ls.set('kk.push', null); renderNotif(); return false; }
  const res = await fetch(PUSH_API + '/sync', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({sub: sub.toJSON(), tasks: pushTasks()}),
  });
  return res.ok;
}
async function enablePush(){
  if(!pushable()){ alert('この端末では通知を使えません。'); return; }
  if(!standalone()){
    alert('通知はホーム画面に追加したアプリからのみ使えます。\n\nSafariの共有ボタン →「ホーム画面に追加」をしてから、そのアイコンで開いてもう一度お試しください。');
    return;
  }
  const perm = await Notification.requestPermission();
  if(perm !== 'granted'){
    alert('通知が許可されませんでした。\n\niPhoneの「設定 →通知 → くりかえし帳」から許可できます。');
    return;
  }
  toast('通知を登録しています…');
  const reg = await navigator.serviceWorker.ready;
  let sub = await reg.pushManager.getSubscription();
  if(!sub){
    sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: b64ToBytes(VAPID_PUBLIC),
    });
  }
  ls.set('kk.push', sub.endpoint);
  const ok = await syncPush();
  renderNotif();
  toast(ok ? '通知をオンにしました（毎朝8時）' : '登録に失敗しました。通信状況を確認してください');
  if(!ok) ls.set('kk.push', null);
  renderNotif();
}
async function disablePush(){
  const sub = await currentSub();
  if(sub){
    await fetch(PUSH_API + '/unsubscribe', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({endpoint: sub.endpoint}),
    }).catch(()=>{});
    await sub.unsubscribe().catch(()=>{});
  }
  ls.set('kk.push', null);
  renderNotif();
  toast('通知をオフにしました');
}
function renderNotif(){
  const on = pushOn();
  $('notifTitle').textContent = on ? 'プッシュ通知：オン' : 'プッシュ通知：オフ';
  $('notifTest').classList.toggle('hidden', !on);
  const sub = $('notifSub');
  if(!pushable())        sub.textContent = 'この端末では使えません';
  else if(!standalone()) sub.textContent = 'ホーム画面に追加したアイコンから開くと使えます';
  else if(on)            sub.textContent = '毎朝8時に「今日やること」をお知らせします。タップでオフ';
  else                   sub.textContent = 'タップすると毎朝8時にお知らせします';
}
$('notifRow').onclick = ()=>{ (pushOn() ? disablePush() : enablePush()).catch(e => alert('うまくいきませんでした：' + e.message)); };
$('notifTest').onclick = async ()=>{
  const sub = await currentSub();
  if(!sub){ toast('登録が見つかりません'); return; }
  toast('テスト通知を送っています…');
  const res = await fetch(PUSH_API + '/test', {
    method: 'POST', headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({endpoint: sub.endpoint}),
  }).catch(()=>null);
  toast(res && res.ok ? '送りました。数秒で届きます' : '送信に失敗しました');
};

/* バックアップ */
function blobToDataURL(b){
  return new Promise(res=>{ const r = new FileReader(); r.onload = ()=>res(r.result); r.readAsDataURL(b); });
}
async function dataURLtoBlob(u){ return (await fetch(u)).blob(); }
$('expBtn').onclick = async ()=>{
  if(!tasks.length){ toast('書き出すものがありません'); return; }
  toast('書き出し中…');
  const recsOut = [];
  for(const r of records){
    const photos = [];
    for(const p of (r.photos || [])){
      photos.push({full: await blobToDataURL(p.full), thumb: await blobToDataURL(p.thumb)});
    }
    recsOut.push({taskId:r.taskId, at:r.at, dateStr:r.dateStr, type:r.type || 'done', from:r.from, to:r.to, memo:r.memo, photos});
  }
  const json = JSON.stringify({app:'kurikaeshi', version:2, exportedAt:Date.now(), groups:groups(), tasks, records:recsOut});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([json], {type:'application/json'}));
  a.download = `くりかえし帳_${todayStr()}.json`;
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 4000);
  toast(`タスク${tasks.length}件・記録${records.length}件を書き出しました`);
};
$('impBtn').onclick = ()=>$('fileImport').click();
$('fileImport').onchange = async e=>{
  const f = e.target.files[0]; e.target.value = '';
  if(!f) return;
  try{
    const data = JSON.parse(await f.text());
    if(data.app !== 'kurikaeshi' || !Array.isArray(data.tasks)) throw new Error('形式が違います');
    if(!confirm(`タスク${data.tasks.length}件・記録${(data.records||[]).length}件を追加します。いまの中身は消えません。`)) return;
    toast('読み込み中…');
    if(Array.isArray(data.groups) && data.groups.length){
      const merged = groups().slice();
      data.groups.forEach(g=>{ if(!merged.includes(g)) merged.push(g); });
      ls.set('kk.groups', merged.slice(0, 12));
    }
    const idMap = new Map();
    for(const o of data.tasks){
      const nid = crypto.randomUUID();
      idMap.set(o.id, nid);
      const task = Object.assign({}, o, {id: nid});
      migrate(task);
      await dbPut('tasks', task);
      tasks.push(task);
    }
    for(const o of (data.records || [])){
      const photos = [];
      for(const p of (o.photos || [])){
        photos.push({id: crypto.randomUUID(), full: await dataURLtoBlob(p.full), thumb: await dataURLtoBlob(p.thumb)});
      }
      const taskId = idMap.get(o.taskId);
      if(!taskId) continue;
      const rec = {id: crypto.randomUUID(), taskId, at: o.at || Date.now(), dateStr: o.dateStr,
        type: o.type || 'done', from: o.from, to: o.to, memo: o.memo || '', photos};
      await dbPut('records', rec);
      records.push(rec);
    }
    renderHome();
    renderSettings();
    toast('読み込みました');
  }catch(err){
    alert('読み込めませんでした。このアプリで書き出したファイルを選んでください。\n\n' + err.message);
  }
};

/* ================= 起動 ================= */
/* 旧版のデータを今の形にそろえる（1日の実施回数と開始日の保持は廃止） */
function migrate(task){
  let dirty = false;
  if('times' in task){ delete task.times; dirty = true; }
  if('start' in task){ delete task.start; dirty = true; }
  if(!('group' in task)){ task.group = ''; dirty = true; }
  return dirty;
}
if('serviceWorker' in navigator && location.protocol === 'https:'){
  window.addEventListener('load', ()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
}
document.addEventListener('visibilitychange', ()=>{
  // 日付が変わっていたときのために、開き直すたびに今日基準で描き直す
  if(!document.hidden && current === 'home') renderHome();
});
loadAll().then(async ()=>{
  for(const t of tasks){ if(migrate(t)) await dbPut('tasks', t); }
  renderHome();
}).catch(e=>toast('読み込みエラー: ' + e.message));
</script>
